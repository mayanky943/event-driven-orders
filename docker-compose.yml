services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4318:4318"  # OTLP HTTP
      - "4317:4317"  # OTLP gRPC

  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"  # UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    depends_on:
      kafka:    { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: order_user
      DB_PASSWORD: order_pw
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8081:8081"

  inventory-service:
    build:
      context: .
      args:
        SERVICE: inventory-service
    depends_on:
      kafka:    { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DB_HOST: postgres
      DB_NAME: inventory_db
      DB_USER: inventory_user
      DB_PASSWORD: inventory_pw
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8082:8082"

  payment-service:
    build:
      context: .
      args:
        SERVICE: payment-service
    depends_on:
      kafka:    { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DB_HOST: postgres
      DB_NAME: payment_db
      DB_USER: payment_user
      DB_PASSWORD: payment_pw
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8083:8083"

  notification-service:
    build:
      context: .
      args:
        SERVICE: notification-service
    depends_on:
      kafka:    { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DB_HOST: postgres
      DB_NAME: notification_db
      DB_USER: notification_user
      DB_PASSWORD: notification_pw
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "8084:8084"
